{% extends 'private_base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="fw-bold mb-4">

                Edit Attendance

            </h2>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="btn btn-success"
                >

                    Update Attendance

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}

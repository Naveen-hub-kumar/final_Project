{% extends 'private_base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-lg border-0">

        <div class="card-body">

            <h1 class="fw-bold mb-4">

                Attendance Management

            </h1>

            <form method="POST">

                {% csrf_token %}

                <div class="row mb-4">

                    <div class="col-md-4">

                        <label class="form-label fw-bold">

                            Select Date

                        </label>

                        <input
                            type="date"
                            name="date"
                            class="form-control"
                            required
                        >

                    </div>

                </div>

                <div class="mb-3">

                    <span class="badge bg-success">

                        ✔ Present

                    </span>

                    <span class="badge bg-danger">

                        ✘ Absent

                    </span>

                </div>
                

                <div class="table-responsive">

                    <table class="table table-bordered table-hover align-middle">

                        <thead class="table-dark">

                            <tr>

                                <th>Name</th>

                                <th>Roll Number</th>

                                <th>Course</th>

                                <th class="text-center">

                                    Present

                                </th>

                                <th class="text-center">

                                    Absent

                                </th>

                            </tr>

                        </thead>

                        <tbody>

                            {% for student in students %}

                            <tr>

                                <td>

                                    {{ student.name }}

                                </td>

                                <td>

                                    {{ student.roll_number }}

                                </td>

                                <td>

                                    {{ student.course }}

                                </td>

                                <!-- PRESENT -->

                                <td class="text-center">

                                    <input
                                        type="checkbox"
                                        name="present_{{ student.id }}"
                                        class="present-checkbox"
                                        data-student="{{ student.id }}"
                                    >

                                </td>

                                <!-- ABSENT -->

                                <td class="text-center">

                                    <input
                                        type="checkbox"
                                        name="absent_{{ student.id }}"
                                        class="absent-checkbox"
                                        data-student="{{ student.id }}"
                                    >

                                </td>

                            </tr>

                            {% endfor %}

                        </tbody>

                    </table>

                </div>

                <button
                    type="submit"
                    class="btn btn-success btn-lg mt-3"
                >

                    Save Attendance

                </button>

            </form>

        </div>

    </div>

</div>

<!-- CHECKBOX SCRIPT -->

<script>

document.addEventListener(
    'DOMContentLoaded',
    function () {

        const presentCheckboxes = document.querySelectorAll(
            '.present-checkbox'
        );

        const absentCheckboxes = document.querySelectorAll(
            '.absent-checkbox'
        );

        presentCheckboxes.forEach(function (checkbox) {

            checkbox.addEventListener(
                'change',
                function () {

                    const studentId = this.dataset.student;

                    const absent = document.querySelector(

                        `.absent-checkbox[data-student="${studentId}"]`

                    );

                    if (this.checked) {

                        absent.checked = false;

                    }

                }
            );

        });

        absentCheckboxes.forEach(function (checkbox) {

            checkbox.addEventListener(
                'change',
                function () {

                    const studentId = this.dataset.student;

                    const present = document.querySelector(

                        `.present-checkbox[data-student="${studentId}"]`

                    );

                    if (this.checked) {

                        present.checked = false;

                    }

                }
            );

        });

    });

</script>

{% endblock %}

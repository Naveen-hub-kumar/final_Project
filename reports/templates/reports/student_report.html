{% extends 'private_base.html' %}

{% block content %}

<h1 class="mb-4">

    Student Attendance Search

</h1>

<form method="GET" class="mb-4">

    <div class="row">

        <div class="col-md-6">

            <input
                type="text"
                name="q"
                class="form-control"
                placeholder="Search Student"
            >

        </div>

        <div class="col-md-2">

            <button
                type="submit"
                class="btn btn-success"
            >

                Search

            </button>

        </div>

    </div>

</form>

<table class="table table-bordered">

    <tr>

        <th class="table-dark">Student</th>

        <th class="table-dark">Attendance Percentage</th>

    </tr>

    {% for item in results %}

    <tr>

        <td>{{ item.student.name }}</td>

        <td>{{ item.percentage }}%</td>

    </tr>

    {% endfor %}

</table>

{% endblock %}

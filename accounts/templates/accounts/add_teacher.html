{% extends 'private_base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <h2 class="mb-4 text-center">

                    Add Teacher

                </h2>

                {% if error %}

                    <div class="alert alert-danger">

                        {{ error }}

                    </div>

                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Name

                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Phone

                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Subject

                        </label>

                        <input
                            type="text"
                            name="subject"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Role

                        </label>

                        <select
                            name="role"
                            class="form-control"
                            required
                        >

                            <option value="Teacher">

                                Teacher

                            </option>

                            <option value="Admin">

                                Admin

                            </option>

                        </select>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100"
                    >

                        Add Teacher

                    </button>
                    
                </form>
                
            </div>
 <a
            href="/accounts/teachers/"
            class="btn btn-secondary"
        >

            Back

        </a>
        </div>

    </div>

</div>

{% endblock %}

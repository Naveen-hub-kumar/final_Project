{% extends 'private_base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4 text-center">

            Teacher Details

        </h2>

        <table class="table table-bordered">

            <tr>

                <th>Name</th>

                <td>

                    {{ teacher.user.first_name }}

                </td>

            </tr>

            <tr>

                <th>Email</th>

                <td>

                    {{ teacher.user.email }}

                </td>

            </tr>

            <tr>

                <th>Phone</th>

                <td>

                    {{ teacher.phone }}

                </td>

            </tr>

            <tr>

                <th>Subject</th>

                <td>

                    {{ teacher.subject }}

                </td>

            </tr>

            <tr>

                <th>Role</th>

                <td>

                    {{ teacher.role }}

                </td>

            </tr>

        </table>

        <div class="text-center">

            <a
                href="/accounts/teachers/"
                class="btn btn-secondary"
            >

                Back

            </a>

        </div>

    </div>

</div>

{% endblock %}

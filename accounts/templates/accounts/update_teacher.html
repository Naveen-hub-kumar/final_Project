{% extends 'private_base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <h2 class="mb-4 text-center">

                    Update Teacher

                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Name

                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            value="{{ teacher.user.first_name }}"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            value="{{ teacher.user.email }}"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Phone

                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            value="{{ teacher.phone }}"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Subject

                        </label>

                        <input
                            type="text"
                            name="subject"
                            class="form-control"
                            value="{{ teacher.subject }}"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Role

                        </label>

                        <select
                            name="role"
                            class="form-control"
                            required
                        >

                            <option
                                value="Teacher"
                                {% if teacher.role == 'Teacher' %}
                                selected
                                {% endif %}
                            >

                                Teacher

                            </option>

                            <option
                                value="Admin"
                                {% if teacher.role == 'Admin' %}
                                selected
                                {% endif %}
                            >

                                Admin

                            </option>

                        </select>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success w-100"
                    >

                        Update Teacher

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
